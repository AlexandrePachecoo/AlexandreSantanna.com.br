<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sua carta virtual está pronta.">
    <meta name="theme-color" content="#e8336b">
    <meta name="robots" content="noindex">
    <title>Sua carta · specialDay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .status-wrap {
            min-height: calc(100vh - 90px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 16px;
        }
        .status-card { max-width: 640px; width: 100%; text-align: center; }
        .status-card h1 {
            font-family: "Playfair Display", serif;
            font-size: clamp(1.8rem, 3.5vw, 2.5rem);
            margin: 0 0 12px;
            color: var(--ink-900);
        }
        .status-card p.lead { color: var(--ink-500); font-size: 1.05rem; margin: 0 0 24px; }
        .spinner {
            width: 64px; height: 64px;
            margin: 0 auto 28px;
            border-radius: 50%;
            border: 4px solid #fde6ef;
            border-top-color: var(--rose-500);
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-icon {
            width: 56px; height: 56px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: #fff1f1;
            color: #c92a2a;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
        }
        .status-meta { margin-top: 20px; color: var(--ink-500); font-size: 0.9rem; }
        .qr-download { font-size: .85rem; margin-top: 8px; }
        .qr-download a { color: var(--rose-600); font-weight: 600; }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container header-inner">
            <a href="/" class="brand" aria-label="specialDay">
                <span class="brand-mark">special</span><span class="brand-tag">Day</span>
            </a>
        </div>
    </header>

    <main class="status-wrap">
        <section class="status-card" id="status-card" aria-live="polite">
            <div class="spinner" id="spinner"></div>
            <h1 id="status-title">Confirmando o pagamento...</h1>
            <p class="lead" id="status-message">Assim que o PIX cair, liberamos o link da sua carta automaticamente.</p>
            <p class="status-meta" id="status-meta"></p>
        </section>
    </main>

    <script>
        (() => {
            "use strict";

            const params = new URLSearchParams(window.location.search);
            const slug = params.get("slug");
            const card = document.getElementById("status-card");

            if (!slug) {
                card.innerHTML = `
                    <div class="error-icon">!</div>
                    <h1>Link inválido</h1>
                    <p class="lead">Não encontramos sua carta. Volte para a página inicial e tente novamente.</p>
                    <div class="share-actions">
                        <a href="/" class="btn btn-primary">Voltar para o início</a>
                    </div>
                `;
                return;
            }

            const MAX_POLLS = 60;
            const POLL_MS = 4000;
            let pollCount = 0;
            let networkFails = 0;
            let pollHandle = null;
            let timedOut = false;

            function escapeHtml(str) {
                return String(str || "").replace(/[&<>"']/g, (c) => ({
                    "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;",
                }[c]));
            }

            const renderPublicada = () => {
                if (pollHandle) clearInterval(pollHandle);
                const cartaUrl = `${window.location.origin}/c/${slug}`;
                const waText = encodeURIComponent(`Fiz uma carta especial pra você 💌 ${cartaUrl}`);
                card.innerHTML = `
                    <h1>Sua carta está pronta! 💌</h1>
                    <p class="lead">Compartilhe o link com quem precisa receber. O QR Code pode ser impresso e colado no presente.</p>
                    <div class="share-box">
                        <div class="qr-box">
                            <img src="/api/qrcode?slug=${encodeURIComponent(slug)}&format=png" alt="QR Code da carta">
                        </div>
                        <p class="qr-download"><a href="/api/qrcode?slug=${encodeURIComponent(slug)}&format=svg" download="carta-${escapeHtml(slug)}.svg">Baixar QR em SVG</a> · <a href="/api/qrcode?slug=${encodeURIComponent(slug)}&format=png" download="carta-${escapeHtml(slug)}.png">baixar em PNG</a></p>
                        <div class="share-link">
                            <input type="text" id="share-url" readonly value="${escapeHtml(cartaUrl)}">
                            <button type="button" id="copy-btn">Copiar</button>
                        </div>
                        <div class="share-actions">
                            <a class="btn btn-whatsapp" href="https://wa.me/?text=${waText}" target="_blank" rel="noopener">
                                Enviar pelo WhatsApp
                            </a>
                            <a class="btn btn-ghost" href="/c/${encodeURIComponent(slug)}" target="_blank" rel="noopener">Ver a carta</a>
                        </div>
                    </div>
                    <p class="status-meta">Carta: ${escapeHtml(slug)}</p>
                `;

                const copyBtn = document.getElementById("copy-btn");
                const shareUrl = document.getElementById("share-url");
                if (copyBtn && shareUrl) {
                    copyBtn.addEventListener("click", async () => {
                        try {
                            await navigator.clipboard.writeText(shareUrl.value);
                            copyBtn.textContent = "Copiado!";
                            copyBtn.classList.add("copied");
                            setTimeout(() => {
                                copyBtn.textContent = "Copiar";
                                copyBtn.classList.remove("copied");
                            }, 1800);
                        } catch {
                            shareUrl.select();
                            document.execCommand("copy");
                        }
                    });
                }
            };

            const renderErro = (mensagem) => {
                if (pollHandle) clearInterval(pollHandle);
                card.innerHTML = `
                    <div class="error-icon">!</div>
                    <h1>Ops, algo deu errado</h1>
                    <p class="lead">${escapeHtml(mensagem || "Não conseguimos confirmar sua carta agora. Tente recarregar a página em alguns instantes.")}</p>
                    <div class="share-actions">
                        <a href="/" class="btn btn-primary">Tentar novamente</a>
                    </div>
                    <p class="status-meta">Carta: ${escapeHtml(slug)}</p>
                `;
            };

            const renderTimeout = () => {
                if (timedOut) return;
                timedOut = true;
                card.innerHTML = `
                    <div class="error-icon">!</div>
                    <h1>Ainda estamos confirmando o pagamento</h1>
                    <p class="lead">Vamos continuar tentando em segundo plano. Pode levar alguns minutos a mais — esta página vai atualizar sozinha quando a carta estiver pronta.</p>
                    <div class="share-actions">
                        <a href="/" class="btn btn-ghost">Voltar para o início</a>
                    </div>
                    <p class="status-meta">Carta: <strong>${escapeHtml(slug)}</strong></p>
                `;
            };

            const poll = async () => {
                pollCount++;
                try {
                    const res = await fetch(`/api/carta-publica?slug=${encodeURIComponent(slug)}&statusOnly=1`);
                    if (res.status === 404) {
                        renderErro("Carta não encontrada.");
                        return;
                    }
                    const data = await res.json();
                    networkFails = 0;
                    if (!data.success) {
                        renderErro(data.error || "Não conseguimos abrir sua carta.");
                        return;
                    }
                    if (data.status === "publicada") {
                        renderPublicada();
                        return;
                    }
                    if (data.status === "erro") {
                        renderErro("Houve um problema ao publicar sua carta.");
                        return;
                    }
                    if (pollCount >= MAX_POLLS) {
                        renderTimeout();
                    }
                } catch (err) {
                    console.error("Erro no polling:", err);
                    networkFails++;
                    if (networkFails > 20) {
                        renderErro("Não conseguimos verificar o status. Tente recarregar a página.");
                    }
                }
            };

            poll();
            pollHandle = setInterval(poll, POLL_MS);
        })();
    </script>

</body>
</html>
