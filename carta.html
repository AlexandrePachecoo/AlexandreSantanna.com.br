<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Uma carta virtual feita com carinho.">
    <meta name="theme-color" content="#e8336b">
    <meta name="robots" content="noindex">
    <title>Uma carta pra você · specialDay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="carta-page" id="carta-root">
        <div class="carta-empty" id="carta-loading">
            <h1>Carregando a carta...</h1>
            <p>Só um instante.</p>
        </div>
    </main>

    <script>
        (() => {
            "use strict";

            const root = document.getElementById("carta-root");

            const getSlug = () => {
                const params = new URLSearchParams(window.location.search);
                const fromQuery = params.get("slug");
                if (fromQuery) return fromQuery;
                const match = window.location.pathname.match(/\/c\/([A-Za-z0-9_-]+)/);
                return match ? match[1] : null;
            };

            const slug = getSlug();
            if (!slug) {
                renderEmpty("Carta não encontrada", "O link parece inválido. Confira com quem te enviou.");
                return;
            }

            function escapeHtml(str) {
                return String(str || "").replace(/[&<>"']/g, (c) => ({
                    "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;",
                }[c]));
            }

            function renderEmpty(title, msg) {
                root.innerHTML = `
                    <div class="carta-empty">
                        <h1>${escapeHtml(title)}</h1>
                        <p>${escapeHtml(msg)}</p>
                        <a class="btn btn-ghost" href="/">Criar a minha carta</a>
                    </div>
                `;
            }

            function renderCarta(carta) {
                const fotosHtml = (carta.fotos || []).map((url) =>
                    `<div class="carta-foto"><img src="${escapeHtml(url)}" alt="" loading="lazy"></div>`
                ).join("");

                const spotifyHtml = carta.spotify
                    ? `<div class="carta-section">
                         <div class="carta-spotify">
                            <iframe src="${escapeHtml(carta.spotify.embed_url)}" height="152" allow="encrypted-media" loading="lazy"></iframe>
                         </div>
                       </div>`
                    : "";

                root.innerHTML = `
                    <article class="carta-wrap">
                        <header class="carta-header">
                            <span class="eyebrow">Uma carta pra você</span>
                            <h1>${escapeHtml(carta.nome_destinatario)}</h1>
                            <p class="carta-subtitle">com carinho, ${escapeHtml(carta.nome_remetente)}</p>
                        </header>

                        ${fotosHtml ? `<div class="carta-section"><div class="carta-fotos">${fotosHtml}</div></div>` : ""}

                        <div class="carta-section">
                            <p class="carta-texto">${escapeHtml(carta.texto)}</p>
                        </div>

                        ${spotifyHtml}

                        <p class="carta-signature">— ${escapeHtml(carta.nome_remetente)}</p>
                    </article>

                    <p class="carta-cta">Feito com specialDay · <a href="/">crie a sua carta</a></p>
                `;
            }

            async function load() {
                try {
                    const r = await fetch(`/api/carta-publica?slug=${encodeURIComponent(slug)}`);
                    if (r.status === 404) {
                        renderEmpty("Carta não encontrada", "Confira o link com quem te enviou.");
                        return;
                    }
                    const data = await r.json();
                    if (!data.success) {
                        renderEmpty("Não foi possível abrir", data.error || "Tente novamente em alguns minutos.");
                        return;
                    }
                    if (data.status !== "publicada" || !data.carta) {
                        renderEmpty("Carta ainda não disponível", "Volte a abrir o link daqui a alguns minutos.");
                        return;
                    }
                    renderCarta(data.carta);
                } catch (err) {
                    console.error("Erro ao carregar carta:", err);
                    renderEmpty("Não foi possível abrir", "Verifique sua conexão e tente de novo.");
                }
            }

            load();
        })();
    </script>

</body>
</html>
